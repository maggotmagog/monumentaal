<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect x="10" y="10" width="780" height="180" fill="#1e293b" rx="8"/>
  <text x="400" y="40" fill="#f8fafc" font-size="18" text-anchor="middle" font-weight="bold">Monumentaal Architecture</text>
  
  <!-- Browser -->
  <rect x="20" y="60" width="180" height="100" fill="#0ea5e9" rx="4"/>
  <text x="110" y="80" fill="white" font-size="12" text-anchor="middle">Browser</text>
  <text x="110" y="100" fill="white" font-size="10" text-anchor="middle">React App</text>
  <text x="110" y="120" fill="white" font-size="10" text-anchor="middle">(Vite Dev)</text>
  <text x="110" y="145" fill="white" font-size="10" text-anchor="middle">localhost:5173</text>
  
  <!-- Data -->
  <rect x="600" y="60" width="180" height="100" fill="#64748b" rx="4"/>
  <text x="690" y="80" fill="white" font-size="12" text-anchor="middle">sites.json</text>
  <text x="690" y="100" fill="white" font-size="10" text-anchor="middle">96 curated</text>
  <text x="690" y="120" fill="white" font-size="10" text-anchor="middle">Wikimedia</text>
  <text x="690" y="145" fill="white" font-size="10" text-anchor="middle">images + data</text>
  
  <!-- Components -->
  <rect x="250" y="70" width="120" height="80" fill="#10b981" rx="4"/>
  <text x="310" y="90" fill="white" font-size="11" text-anchor="middle">App.jsx</text>
  <text x="310" y="110" fill="white" font-size="10" text-anchor="middle">state + filter</text>
  <text x="310" y="130" fill="white" font-size="10" text-anchor="middle">logic</text>
  
  <rect x="400" y="70" width="120" height="80" fill="#f59e0b" rx="4"/>
  <text x="460" y="90" fill="white" font-size="11" text-anchor="middle">Components</text>
  <text x="460" y="110" fill="white" font-size="9" text-anchor="middle">MapView</text>
  <text x="460" y="125" fill="white" font-size="9" text-anchor="middle">SiteCard</text>
  <text x="460" y="140" fill="white" font-size="9" text-anchor="middle">SearchBar</text>
  <text x="460" y="155" fill="white" font-size="9" text-anchor="middle">FilterBar</text>
  
  <!-- Arrows -->
  <line x1="200" y1="110" x2="250" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="110" x2="400" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="110" x2="600" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  
  <!-- Leaflet note -->
  <text x="310" y="190" fill="#94a3b8" font-size="9" text-anchor="middle">React Leaflet (no API key)</text>
  <text x="690" y="190" fill="#94a3b8" font-size="9" text-anchor="middle">Tailwind CSS</text>
</svg>
